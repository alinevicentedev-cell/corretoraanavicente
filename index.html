<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Vicente · Corretora de Imóveis & Perita Avaliadora</title>
<meta name="theme-color" content="#0a0a0d">
<style>
html,body{margin:0;min-height:100%;background:#0a0a0d;color:#f3efe6;font-family:Arial,sans-serif}
</style>
</head>
<body>
<script>
(async function(){
  const response = await fetch('/site.html', { cache: 'no-store' });
  let html = await response.text();
  const fix = '<style>.brand{align-items:center!important}.brand .role{display:none!important}.foot-bottom .dev-credit{color:var(--gold);font-weight:400}</style>';
  const credit = '<p class="dev-credit">Desenvolvido por Aline Flores</p>';
  html = html.replace('</head>', fix + '</head>');
  if (!html.includes('Desenvolvido por Aline Flores')) {
    html = html.replace('      <p class="disc">As avaliações seguem a ABNT NBR 14.653-2 e as resoluções do sistema COFECI/CRECI.</p>', '      <p class="disc">As avaliações seguem a ABNT NBR 14.653-2 e as resoluções do sistema COFECI/CRECI.</p>\n      ' + credit);
  }
  document.open();
  document.write(html);
  document.close();
})().catch(function(){
  window.location.replace('/site.html');
});
</script>
</body>
</html>
