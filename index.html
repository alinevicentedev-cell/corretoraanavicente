<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Vicente · Corretora de Imóveis & Perita Avaliadora</title>
<meta name="theme-color" content="#0a0a0d">
<style>
html,body{margin:0;min-height:100%;background:#0a0a0d;color:#f3efe6;font-family:Arial,sans-serif}
</style>
</head>
<body>
<script>
(async function(){
  const response = await fetch('/site.html', { cache: 'no-store' });
  let html = await response.text();
  const fix = '<style>.brand{align-items:flex-start!important}.brand .role{margin-top:2px!important;transform:translateY(-4px)!important}</style>';
  html = html.replace('</head>', fix + '</head>');
  document.open();
  document.write(html);
  document.close();
})().catch(function(){
  window.location.replace('/site.html');
});
</script>
</body>
</html>
