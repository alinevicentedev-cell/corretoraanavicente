<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagem enviada | Ana Vicente</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0a0a0d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:#0a0a0d;
  --graphite:#121217;
  --line:rgba(217,180,91,.18);
  --gold:#d9b45b;
  --ivory:#f3efe6;
  --mist:#a6a6b0;
  --grad-gold:linear-gradient(135deg,#f0d488 0%,#d9b45b 45%,#a9801f 100%);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:28px;
  background:
    radial-gradient(70% 50% at 75% 20%,rgba(217,180,91,.12),transparent 60%),
    linear-gradient(180deg,var(--graphite),var(--obsidian));
  color:var(--ivory);
  font-family:'Inter',sans-serif;
  line-height:1.65;
}
main{
  width:min(100%,680px);
  border:1px solid var(--line);
  background:rgba(18,18,23,.76);
  padding:48px;
  border-radius:10px;
}
.eyebrow{
  font-family:'Space Grotesk',sans-serif;
  color:var(--gold);
  letter-spacing:.28em;
  text-transform:uppercase;
  font-size:.72rem;
  margin-bottom:18px;
}
h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(2.2rem,6vw,4rem);
  line-height:1;
  letter-spacing:-.02em;
}
p{color:var(--mist);margin-top:22px;font-weight:300}
.actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:34px}
a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:52px;
  padding:14px 24px;
  border-radius:2px;
  font-family:'Space Grotesk',sans-serif;
  text-decoration:none;
  transition:transform .35s var(--ease),border-color .35s var(--ease);
}
.primary{background:var(--grad-gold);color:#1a1206}
.secondary{border:1px solid var(--line);color:var(--ivory)}
a:hover{transform:translateY(-2px)}
@media(max-width:560px){
  main{padding:34px 24px}
  .actions a{width:100%}
}
</style>
</head>
<body>
<main>
  <div class="eyebrow">Contato recebido</div>
  <h1>Obrigada pela mensagem.</h1>
  <p>Seu contato foi enviado com sucesso. A Ana retornará assim que possível. Para atendimento imediato, você também pode iniciar a conversa pelo WhatsApp.</p>
  <div class="actions">
    <a class="primary" href="https://wa.me/5547996714706?text=Ol%C3%A1%2C%20Ana!%20Acabei%20de%20enviar%20uma%20mensagem%20pelo%20site.">Abrir WhatsApp</a>
    <a class="secondary" href="/">Voltar ao site</a>
  </div>
</main>
</body>
</html>
